name: Preview on Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    name: Preview Channel Deploy
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CELL_REPAIR_PHX }}
          projectId: cell-repair-phx
