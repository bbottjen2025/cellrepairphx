<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" width="120" height="200">
  <!-- Phone body - slightly squarer corners than iPhone -->
  <rect x="15" y="8" width="90" height="184" rx="14" ry="14" fill="#1D3557" />
  <!-- Screen edge-to-edge -->
  <rect x="18" y="11" width="84" height="178" rx="12" ry="12" fill="#16213e" />
  <!-- Screen -->
  <rect x="21" y="22" width="78" height="156" rx="3" ry="3" fill="#A8DADC" opacity="0.15" />
  <!-- Punch-hole camera -->
  <circle cx="60" cy="17" r="5" fill="#0d1b2a" />
  <circle cx="60" cy="17" r="3" fill="#16213e" />
  <circle cx="60" cy="17" r="1.2" fill="#1D3557" />
  <!-- Side buttons -->
  <rect x="10" y="60" width="5" height="14" rx="2" fill="#457B9D" />
  <rect x="105" y="55" width="5" height="20" rx="2" fill="#457B9D" />
  <rect x="105" y="80" width="5" height="34" rx="2" fill="#457B9D" />
  <!-- Home indicator bar -->
  <rect x="46" y="172" width="28" height="4" rx="2" fill="#457B9D" opacity="0.6" />
  <!-- Triple rear camera bump (implied top-left) -->
  <rect x="28" y="35" width="28" height="6" rx="2" fill="#E63946" opacity="0.5" />
  <rect x="28" y="47" width="40" height="5" rx="2" fill="#fff" opacity="0.12" />
  <rect x="28" y="58" width="35" height="5" rx="2" fill="#fff" opacity="0.10" />
</svg>
